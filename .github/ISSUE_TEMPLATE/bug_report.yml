name: Bug Report
description: Report a bug in flk
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: flk version
      description: Run `flk --version` to find this.
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.0, Ubuntu 22.04"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Affected platform
      multiple: true
      options:
        - gh
        - aws
        - ansible
        - k8s
        - core (not platform-specific)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Define resource ...
        2. Run `flk apply`
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or logs.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: |
        Share the relevant parts of your `.yml` files. 
        Remove any sensitive values before posting.
      render: yaml

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have removed all sensitive values from the configuration above.
          required: true
